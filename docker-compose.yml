services:
  fastapi:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATA_DIR: /data
      RETENTION_SECONDS: "3600"
      TASK_TIMEOUT_SECONDS: "60"
      TLS_CERT_FILE: /run/sandbox-secrets/tls/server.crt
      TLS_KEY_FILE: /run/sandbox-secrets/tls/server.key
    ports:
      - "0.0.0.0:18081:8000"
    volumes:
      - ./data:/data
      - ./secrets:/run/sandbox-secrets:ro
    command: ["./start.sh"]
